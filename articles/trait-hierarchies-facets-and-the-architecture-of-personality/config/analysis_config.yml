article_slug: trait-hierarchies-facets-and-the-architecture-of-personality
dataset: data/synthetic_hierarchical_trait_items.csv
outputs_dir: outputs
identifiers:
  - respondent_id
domain_columns:
  - extraversion_score
  - agreeableness_score
  - conscientiousness_score
  - neuroticism_score
  - openness_score
facet_columns:
  - sociability_score
  - assertiveness_score
  - compassion_score
  - politeness_score
  - orderliness_score
  - industriousness_score
  - anxiety_score
  - volatility_score
  - aesthetics_score
  - intellect_score
outcome_columns:
  - broad_life_functioning
  - focused_reliability_outcome
  - creative_engagement_outcome
derived_columns:
  - bandwidth_fidelity_gap
  - facet_profile_dispersion
  - hierarchy_consistency_index
notes:
  - Synthetic item-level data only.
  - Professional education, research prototyping, psychometric demonstration, and methodological comparison are appropriate uses.
  - Not a standalone assessment, diagnosis, placement, screening, prediction, or decision system.
